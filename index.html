<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa São Thomé das Letras</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    html, body { height: 100%; margin: 0; padding: 0; }
    #map { width: 100%; height: 100vh; }
  </style>
</head>
<body>
  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // Inicializa o mapa
    const map = L.map('map').setView([-21.741, -45.252], 13);

    // Tiles OpenStreetMap
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Pontos de interesse
    const pontos = [
      { nome: 'Cachoeira Eubiose', coords: [-21.740, -45.250], desc: 'Cachoeira famosa da cidade' },
      { nome: 'Cachoeira Véu de Noiva', coords: [-21.738, -45.255], desc: 'Outra cachoeira linda' },
      { nome: 'Centro Histórico', coords: [-21.741, -45.252], desc: 'Centro da cidade' },
      { nome: 'Gruta do Sobradinho', coords: [-21.742, -45.256], desc: 'Gruta famosa para turismo' }
    ];

    pontos.forEach(p => {
      L.marker(p.coords).addTo(map)
        .bindPopup(<b>${p.nome}</b><br>${p.desc});
    });

    // Marcador clicável
    map.on('click', e => {
      L.marker(e.latlng).addTo(map)
        .bindPopup(Marcador criado<br>${e.latlng.lat.toFixed(5)}, ${e.latlng.lng.toFixed(5)})
        .openPopup();
    });
  </script>
</body>
</html>
